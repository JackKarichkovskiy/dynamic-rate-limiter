spring:
  application:
    name: ZilchInterview
  config:
    import: 'file:./external-config.properties'
  cloud:
    config:
      enabled: false
  data:
    redis:
      host: localhost
      port: 6379
  docker:
    compose:
      enabled: true
      file: docker-compose.yaml

management:
  endpoint:
    refresh:
      enabled: true
  endpoints:
    web:
      exposure:
        include: refresh

logging:
  level:
    "org.example.zilchinterview": DEBUG
    "org.springframework.boot.actuate": DEBUG

app:
  rate-limiter:
    token-bucket:
      rpm: 10
    fixed-window:
      rpm: 5